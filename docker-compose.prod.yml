services:
  backend:
    image: yourdockerhubusername/gateway-backend:a1b2c3d

    environment:
      SECRET_KEY: prod-secret
      DEBUG: "False"

      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: prod_db
      DB_USER: prod_user
      DB_PASSWORD: prod_password
      DB_HOST: prod-db
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379