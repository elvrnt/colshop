version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: kursach
      POSTGRES_USER: kursach
      POSTGRES_PASSWORD: kursach
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: kursach
      DB_USER: kursach
      DB_PASSWORD: kursach
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: "*"
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      # For advanced setups you can inject API base, but defaults to hostname:8000
      API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data:

