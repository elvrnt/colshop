version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: kursach
      POSTGRES_USER: kursach
      POSTGRES_PASSWORD: kursach
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: kursach
      DB_USER: kursach
      DB_PASSWORD: kursach
      DB_HOST: db
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379

      ALLOWED_HOSTS: "*"
    depends_on:
      - db
      - redis
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      API_BASE: http://localhost:8000
    depends_on:
      - nginx
    ports:
      - "8080:80"

volumes:
  db_data: